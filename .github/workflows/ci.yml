name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Run linting checks
        run: hk check

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    # macOS notes:
    #   - The chezmoi run_onchange scripts gate on $CI / $GITHUB_ACTIONS to
    #     skip GUI-bound work (macOS preferences, nvim Lazy! sync, Claude Code
    #     installer) and Homebrew casks (GUI apps / paid software / GUI auth).
    #   - Brew formulas (CLI tools) still install so we catch bundle drift.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Install chezmoi
        # GITHUB_TOKEN gives mise's aqua/github backends authenticated rate
        # limits (5000/hr) instead of the 60/hr anonymous cap. Without it the
        # large global mise tool list trips the limit partway through install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GIT_USER_NAME="CI Test User" GIT_USER_EMAIL="ci@example.com" WORK_PROFILE=false ./install
      - name: Dump install logs on failure
        if: failure()
        run: |
          find /tmp/dotfiles-install-*/steps -name "*.log" 2>/dev/null | sort | while read -r f; do
            echo "====== $f ======"
            cat "$f"
            echo
          done
      - name: Install test dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/setup
      - name: Run test suite
        run: |
          ./bin/test
