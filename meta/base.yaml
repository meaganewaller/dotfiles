- defaults:
    link:
        create: true
        force: true
        relink: true
    shell:
        stdout: true
        stderr: true

- create:
    - $HOME/.config

- clean:
    $HOME:
        force: true
    $HOME/.config:
        recursive: true

- shell:
    - ["git submodule update --init --recursive", "Installing submodules"]
