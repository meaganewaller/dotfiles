# --- MacOS UI Elements Configuration ---

- tap:
  - koekeishiya/formulae

- brew:
  - yabai
  - sketchybar

- cask:
  - dozer
  - hammerspoon
  - karabiner

- link:
    ~/.config/yabai/yabairc: gui/yabai/yabairc
    ~/.config/yabai/scripts: gui/yabai/scripts
    ~/.config/sketchybar:
      glob: true
      path: gui/sketchybar/**/*
    ~/.hammerspoon: gui/hammerspoon

- shell:
    - "brew services start sketchybar"
    - "brew services start yabai"
    - "./scripts/macos.sh"
