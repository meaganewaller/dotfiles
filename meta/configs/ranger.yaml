# --- Ranger Configuration ---
- pip:
    file: tools/ranger/requirements.txt
    user: true
    stdout: false
    stderr: true


- ifubuntu:
    - apt:
        - file
        - highlight

- ifarch:
    - pacman:
        - file
        - highlight

- ifmacos:
    - brew:
        - highlight

- create:
    - ~/.config/ranger

- link:
    ~/.config/ranger/rifle.conf: tools/ranger/rifle.conf
    ~/.config/ranger/rc.conf: tools/ranger/rc.conf
    ~/.config/ranger/commands.py: tools/ranger/commands.py

- ghq:
  - alexanderjeurissen/ranger_devicons

- link:
    ~/.config/ranger/plugins/ranger_devicons: ~/ghq/github.com/alexanderjeurissen/ranger_devicons
