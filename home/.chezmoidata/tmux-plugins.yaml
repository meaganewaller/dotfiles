# Tmux plugin trees fetched as Chezmoi externals (see docs/adrs/0002-tmux-plugins-via-chezmoi-externals.md).
# Each entry under `extras` becomes a block in `.chezmoiexternal.toml.tmpl`.
#
# Supported shapes:
#   - type: archive — optional exact (bool), stripComponents (int)
#   - type: git-repo — optional revision (string) when pinning beyond URL defaults
#
tmux_plugins:
  extras:
    - path: ".config/tmux/plugins/tmux-sensible"
      type: git-repo
      url: https://github.com/tmux-plugins/tmux-sensible.git
      revision: 25cb91f42d020f675bb0a2ce3fbd3a5d96119efa
      refreshPeriod: "168h"
    - path: ".config/tmux/plugins/tmux-powerline"
      type: git-repo
      url: https://github.com/erikw/tmux-powerline.git
      revision: 6cddf8051823815db77fc00dcbb6bcca9afbdec2
      refreshPeriod: "168h"
    - path: ".config/tmux/plugins/tmux-prefix-highlight"
      type: git-repo
      url: https://github.com/tmux-plugins/tmux-prefix-highlight
      revision: 06cbb4ecd3a0a918ce355c70dc56d79debd455c7
      refreshPeriod: "168h"
