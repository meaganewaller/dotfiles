# Mise tool configuration for user environment
# See docs/package-management.md for adding/updating packages
#
# Backend Priority (prefer earlier opts)
#   1. Native mise tools (runtimes like python, node)
#   2. aqua: - best security/features, no plugins
#   3. github: - tools not in aqua registry
#   4. pipx: - Python CLI tools (requires python)
#   5. npm: - Node CLI tools (requires node)

[settings]
color_theme = "catppuccin"
lockfile = true

[tools]
# Runtimes (install first - required by pipx/npm backends)
node = "latest"
python = "latest"
pkl = "latest"
rust = "stable"

eza = "latest"

"github:BurntSushi/ripgrep" = "latest"
"github:ajeetdsouza/zoxide" = { version = "latest", platforms.linux-arm64 = { asset_pattern = "zoxide-*-aarch64-unknown-linux-musl.tar.gz" } }
"github:buildkite/cli" = "latest"
"github:carapace-sh/carapace-bin" = "latest"
"github:charmbracelet/glow" = "latest"
"github:cli/cli" = "latest"
"github:dandavison/delta" = "latest"
"github:dlvhdr/gh-dash" = "latest"
"github:gitleaks/gitleaks" = "latest"
"github:jesseduffield/lazygit" = "latest"
"github:jqlang/jq" = "latest"
"github:jdx/hk" = "latest"
"github:junegunn/fzf" = "latest"
"github:mikefarah/yq" = "latest"
"github:muesli/duf" = "latest"
"github:neovim/neovim" = "latest"
"github:sharkdp/bat" = "latest"
"github:sharkdp/fd" = "latest"
"github:sst/opencode" = "latest"
"github:starship/starship" = "latest"

# pipx itself (must be installed before any pipx: packages)
pipx = "latest"

# Python tools via pipx
"pipx:claude-conversation-extractor" = "latest"
"pipx:gitingest" = "latest"

# Node tools via npm
"npm:@playwright/mcp" = "latest"
"npm:@owloops/claude-powerline" = "latest"
"npm:bktide" = "latest"
"npm:ccusage" = "latest"
"npm:git-mob" = "latest"
