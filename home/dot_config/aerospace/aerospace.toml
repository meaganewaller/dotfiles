# AeroSpace — tiling window manager for macOS (https://nikitabobko.github.io/AeroSpace/)
#
# This config is intentionally adopted in PHASES so the bar of "usable" never
# drops. Each phase is a separate PR. See docs as we go; the phase a block
# belongs to is noted inline so future phases are obvious diffs.
#
#   Phase 1 (this file) — CALM BASELINE. Every window floats, so the screen
#     looks exactly like plain macOS. The only new powers are workspace
#     navigation. Goal: build muscle memory before any auto-tiling.
#   Phase 2+ — tiling is introduced deliberately, one workspace at a time.
#
# AeroSpace hot-reloads this file on save — no reload command needed.
# Full reference: https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace at login (managed here rather than via macOS Login Items).
start-at-login = true

# Commands run once, after AeroSpace starts.
after-startup-command = []

# ── Normalizations ──────────────────────────────────────────────────────────
# Left at defaults for Phase 1. They only affect tiled containers, and in
# Phase 1 nothing is tiled, so they're inert until we start tiling.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout for the root container. Irrelevant in Phase 1 because the
# catch-all float rule below keeps every window floating; it becomes meaningful
# in Phase 2 when we let a workspace tile.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Follow focus across monitors with the mouse (gentle, no window movement).
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Don't fight macOS's own hide behavior.
automatically-unhide-macos-hidden-apps = false

# Tell sketchybar when the focused workspace changes, so the per-monitor
# workspace pills can re-highlight (Phase 2: aerospace ↔ sketchybar). The pill
# rendering + highlight logic lives in ~/.config/sketchybar/sketchybarrc; here we
# only fire the event carrying the now-focused workspace. Full path so it
# resolves under AeroSpace's launchd environment.
exec-on-workspace-change = ['/bin/bash', '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED=$AEROSPACE_FOCUSED_WORKSPACE',
]

# ── Gaps ──────────────────────────────────────────────────────────────────── (Phase 1: outer gaps unused while floating; tuned in Phase 3)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.right = 8
# Reserve room for the sketchybar bar (top, 30px) so tiled windows don't sit under
# it. Per-monitor: the built-in's notch menu bar is already taller than the bar, so
# it needs only the normal 8px gap; external displays have a ~24px menu bar, so the
# 30px bar overhangs the tiling area — we add the overflow on top of the 8px gap.
# NOTE: only takes effect once a workspace TILES (Phase 1 floats everything, and
# AeroSpace never repositions floating windows). The external value is a starting
# estimate — fine-tune it the first time a workspace tiles and we can see the edge.
outer.top = [{ monitor."Built-in Retina Display" = 8 }, 14]

# ── Workspaces → monitors ─────────────────────────────────────────────────────
# PREREQUISITE (macOS Display settings, not config): stagger the monitors so each
# one keeps a free bottom corner. AeroSpace hides an inactive workspace by parking
# its windows off-screen in a monitor's bottom-left or bottom-right corner. When two
# displays sit flush along an edge they *share* that corner, so the parked windows
# spill onto the neighboring screen — e.g. a portrait monitor flush against the
# ultrawide's bottom shows the ultrawide's hidden windows along its lower edge.
# Offset the displays (don't align their edges) so every monitor has an open bottom
# corner to hide into. Fix the arrangement, not the config.
# See https://nikitabobko.github.io/AeroSpace/guide#proper-monitor-arrangement
#
# Multi-monitor calm (Phase 1 refinement). Without this, an unassigned workspace
# defaults to the *main* monitor, so all of 1–9 piled onto the ultrawide and
# `alt+1..9` yanked windows around that one screen while the other two displays
# held unreachable workspaces. Pinning each workspace to a monitor gives every
# screen its own stable lane: `alt+N` jumps to that workspace's monitor and only
# that monitor changes — windows never cross screens on a switch.
#
# Monitors are matched by name (regex), so this survives macOS renumbering them.
# If a monitor is disconnected (e.g. undocked), AeroSpace falls back to the main
# display for its workspaces — so an undocked laptop still reaches 1–9.
#   S34J55x  = ultrawide (main) · Built-in = laptop · DELL U2417H = portrait
[workspace-to-monitor-force-assignment]
1 = 'S34J55x'
2 = 'S34J55x'
3 = 'S34J55x'
4 = 'S34J55x'
5 = 'S34J55x'
6 = 'Built-in'
7 = 'Built-in'
8 = 'Built-in'
9 = 'DELL U2417H'

# ── Calm baseline: float everything ──────────────────────────────────────────
# PHASE 1 keystone. This catch-all rule floats every newly-detected window, so
# AeroSpace behaves like "virtual desktops with great keybinds" and never
# rearranges your windows. In Phase 2 we narrow/remove this so a chosen
# workspace can tile.
[[on-window-detected]]
run = ['layout floating']

# ── Keybindings ───────────────────────────────────────────────────────────────
# Main modifier is alt (option): the AeroSpace community default. It rarely
# clashes with app/macOS shortcuts and leaves cmd free for Raycast (cmd+space)
# and normal app use.
[mode.main.binding]

# Reload config by hand if a hot-reload ever gets stuck (escape hatch).
alt-shift-c = 'reload-config'

# Workspace navigation — the only new powers in Phase 1.
# alt+<n>: jump to workspace N.
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# alt+shift+<n>: send the focused window to workspace N (stay put).
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Quick toggle back to the previous workspace (tab-like).
alt-tab = 'workspace-back-and-forth'

# NOTE: focus movement (alt+h/j/k/l), layout toggles, fullscreen, app→workspace
# rules, sketchybar indicators, and resize/service modes arrive in Phases 2–6.
