<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>my dotfiles</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link rel="stylesheet" href="_assets/style.css" />
    <link rel="stylesheet" href="_assets/ps-icon-pack.min.css" />
    <link
      rel="stylesheet"
      href="//cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anonymous+Pro&family=Fira+Code:wght@400;600&family=IBM+Plex+Mono:ital,wght@1,400;1,600&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style type="text/css">
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .sidebar-nav,
      nav,
      button {
        font-family: "Press Start 2P", cursive;
      }
      .cover {
        background: url("_media/bg.png") !important;
      }

      .markdown-section pre > code {
        font-family: "Fira Code", monospace;
      }

      .sidebar li {
        margin: 0 0 0 24px;
      }

      .text-center {
        text-align: center;
      }

      .app-nav li ul {
        padding: 0;
      }

      .app-sub-sidebar .section-link:before {
        content: " ";
      }

      a.edit-this-page {
        float: right;
        color: #444;
      }

      @media screen and (max-width: 500px) {
        a.edit-this-page {
          float: none;
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        auto2top: true,
        loadSidebar: true,
        maxLevel: 4,
        subMaxLevel: 2,
        themeColor: "#FF75ED",
        executeScript: true,
        loadNavbar: true,
        homepage: "home.md",
        autoHeader: true,
        mergeNavbar: true,
        formatUpdated: "{MM}/{DD} {HH}:{mm}",
        name: "Dotfiles",
        repo: "https://github.com/meaganewaller/dotfiles",
        coverpage: true,
        plugins: [
          function (hook, vm) {
            hook.beforeEach(function (html) {
              var url =
                "https://github.com/meaganewaller/dotfiles/blob/main/docs/" +
                vm.route.file;
              var editHtml =
                '<a class="edit-this-page" href="' +
                url +
                '">Edit This Page on GitHub<\/a>\n';
              var footer = [""];

              return (
                html +
                "\n----\n" +
                "Last modified {docsify-updated} " +
                editHtml +
                "\n----\n" +
                footer.join("")
              );
            });
          },
        ],
      };
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//unpkg.com/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  </body>
</html>
