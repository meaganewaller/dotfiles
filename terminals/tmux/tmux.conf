# vim:ft=tmux tw=0

set -g status on

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string '#{pane_current_command}'

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

unbind e
bind e new-window -n '~/.tmux.conf' "sh -c 'vim ~/.tmux.conf && tmux source ~/.tmux.conf'"

bind -n M-Left previous-window
bind -n M-Right next-window

unbind r
bind r \
  source-file ~/.tmux.conf \;\
  display 'Reloaded tmux config'

unbind m
bind m setw mouse

# Refresh status line every 15 seconds - update time and system load
set -g status-interval 15

# Start window and pane indices at 1.
set -g base-index 1
set -g pane-base-index 1

set -g status-left ''
set -g status-right-length 100
set -g status-style 'bg=black,fg=white'

# Clock Mode
setw -g clock-mode-colour brightcyan

# Window status
#set-option -g status-position bottom
setw -g window-status-format '#[fg=blue]#[fg=black,bold,bg=blue] #I #[fg=blue,bg=black]#[fg=white,bg=black] #W '
setw -g window-status-current-format '#[fg=cyan]#[fg=black,bold,bg=cyan] #I #[fg=cyan,bg=black]#[fg=cyan,bg=black] #W '
source-file ~/.tmux/status

# Hide border
set -g pane-active-border-style "fg=black"
set -g pane-border-style "fg=black"

set-option -g mouse on
set -sg escape-time 0
bind-key -n C-k clear-history
bind-key v split-window -h
bind-key s split-window -v

bind-key < resize-pane -L 5
bind-key > resize-pane -R 5
bind-key + resize-pane -U 5
bind-key - resize-pane -D 5
bind-key = select-layout even-vertical
bind-key | select-layout even-horizontal

# Movement vi-like
bind-key -r k select-pane -U
bind-key -r j select-pane -D
bind-key -r h select-pane -L
bind-key -r l select-pane -R

# Movement normal :)
bind-key Up select-pane -U
bind-key Down select-pane -D
bind-key Left select-pane -L
bind-key Right select-pane -R

# Copy | require xclip
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe "xclip"
#bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -i -sel clip > /dev/null"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

