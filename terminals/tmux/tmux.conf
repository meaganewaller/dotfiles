# Refresh status line every 5 seconds - Good for when music is playing / update time etc
set -g status-interval 5

# Start window and pane indices at 1
set -g base-index 1
set -g pane-base-index 1

# Length of tmux status line
set -g status-left-length 30
set -g status-right-length 150

set-option -g status "on"

# Default statusbar color
set-option -g status-style bg=$tmux_bg,fg=$tmux_fg

# Default window title colors

set-window-option -g window-status-style bg=$tmux_magenta,fg=$tmux_bg
# Default window with an activity alert
set-window-option -g window-status-activity-style bg=$tmux_bg,fg=$tmux_active_fg

# Active window title colors
set-window-option -g window-status-current-style bg=$tmux_red,fg=$tmux_bg

# Set active pane border color
set-option -g pane-active-border-style fg=$tmux_green

# Set inactive pane border color
set-option -g pane-border-style fg=$tmux_white

# Message info
set-option -g message-style bg=$tmux_magenta,fg=$tmux_bright_white # bg=bg2, fg=fg1

# Writing commands inactive
set-option -g message-command-style bg=$tmux_bright_white,fg=$tmux_magenta # bg=fg3, fg=bg1

# Pane number display
set-option -g display-panes-active-colour $tmux_yellow #fg2
set-option -g display-panes-colour $tmux_red #bg1

# Clock
set-window-option -g clock-mode-colour $tmux_bright_cyan #blue

# Bell
set-window-option -g window-status-bell-style bg=colour167,fg=colour235 # bg=red, fg=bg

set-option -g status-left "\
#[fg=$tmux_yellow, bg=$tmux_green]#{?client_prefix,#[bg=$tmux_green],} ❐ #S \
#[fg=colour241, bg=colour237]#{?client_prefix,#[fg=$tmux_green],}#{?window_zoomed_flag, 🔍,}"

set-option -g status-right "\
#[fg=colour214, bg=colour237] \
#[fg=colour237, bg=colour214] #(~/.tmux/scripts/music.sh) \
#[fg=colour223, bg=colour237] #(~/.tmux/scripts/uptime.sh) \
#[fg=colour246, bg=colour237]  %b %d '%y\
#[fg=colour109]  %H:%M \
#[fg=colour248, bg=colour239]"

set-window-option -g window-status-current-format "\
#[fg=colour237, bg=colour214]\
#[fg=colour239, bg=colour214] #I* \
#[fg=colour239, bg=colour214, bold] #W \
#[fg=colour214, bg=colour237]"

set-window-option -g window-status-format "\
#[fg=colour237,bg=colour239,noitalics]\
#[fg=colour223,bg=colour239] #I \
#[fg=colour223, bg=colour239] #W \
#[fg=colour239, bg=colour237]"

# Set the history limit so we get lots of scrollback.
setw -g history-limit 50000000

