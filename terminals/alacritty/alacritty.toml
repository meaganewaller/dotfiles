import = ["~/.config/alacritty/colors/lover-light.toml"]
live_config_reload = true

[cursor]
style = "Beam"

[font]
normal = { family = "SpaceMono Nerd Font Mono", style = "Regular" }
bold = { family = "SpaceMono Nerd Font Mono", style = "Bold" }
italic = { family = "VictorMono Nerd Font Mono", style = "Light Italic" }
bold_italic = { family = "VictorMono Nerd Font Mono", style = "Bold Italic" }
size = 22.0

[font.offset]
x = 0
y = 1

[window]
decorations = "none"
dynamic_padding = true
opacity = 0.97
option_as_alt = "Both"

[window.padding]
x = 10
y = 10

[shell]
program = "/usr/local/bin/fish"
args = ['--login']
