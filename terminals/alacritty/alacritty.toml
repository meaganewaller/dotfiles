import = ["~/.config/alacritty/colors/lover-dark.toml"]
live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
normal = { family = "SpaceMono Nerd Font Mono", style = "Regular" }
bold = { family = "SpaceMono Nerd Font Mono", style = "Bold" }
italic = { family = "VictorMono Nerd Font Mono", style = "Light Italic" }
bold_italic = { family = "VictorMono Nerd Font Mono", style = "Bold Italic" }
size = 22.0

[font.offset]
x = 0
y = 1

[window]
decorations = "none"
dynamic_padding = false
opacity = 0.9
option_as_alt = "Both"

[window.padding]
x = 10
y = 10

[shell]
args = ["new-session", "-A", "-D", "-s", "main"]
program = "/usr/local/bin/tmux"
