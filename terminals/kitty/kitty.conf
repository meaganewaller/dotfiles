# vim:ft=kitty:fdm=marker

shell                                 fish --login --interactive
font_size                             18.0
font_family                           FiraCode Nerd Font Mono Regular
font_bold                             FiraCode Nerd Font Mono SemiBold
font_italic                           BlexMono Nerd Font Mono Medium Italic
font_bold_italic                      BlexMono Nerd Font Mono SemiBold Italic
font_features                         +liga +calt +dlig +frac +ordn +subs +sups
shell_integration                     no-complete no-title no-cwd
allow_remote_control                  yes
listen_on                             unix:/tmp/mykitty # for kitty navigator
update_check_interval                 24
startup_session                       none
clipboard_control                     write-clipboard read-clipboard write-primary read-primary
term                                  xterm-kitty
shell_integration                     enabled

cursor_shape                          block
editor                                nvim
cursor_blink_interval                 0
scrollback_lines                      20000
scrollback_pager                      less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
hide_window_decorations               titlebar-only
confirm_os_window_close               1
close_on_child_death                  yes

macos_titlebar_color                  background
macos_option_as_alt                   yes
macos_show_window_title_in            all
macos_colorspace                      displayp3
dynamic_background_opacity            yes
background_opacity                    0.85
background_blur                       10
background_image                      none
background_image_layout               tiled
background_tint                       0.0
dim_opacity                           0.75

wheel_scroll_multiplier               5.0
touch_scroll_multiplier               1.0
mouse_hide_wait                       3.0

url_style                             curly
detect_urls                           yes
open_url_with                         default
url_prefixes                          http https ftp mailto

copy_on_select                        yes
strip_trailing_spaces                 smart

select_by_word_characters            @-./_~?&=%+#
click_interval                       -1.0
focus_follows_mouse                  no
pointer_shape_when_grapped           grabbing

repaint_delay                        10
input_delay                          3
sync_to_monitor                      yes

enable_audio_bell                    no
visual_bell_duration                 0.0
window_alert_on_bell                 no
bell_on_tab                          yes
command_on_bell                      none

remember_window_size                 yes
initial_window_width                 640
initial_window_height                480
enabled_layouts                      splits,stack
window_resize_step_cells             2
window_resize_step_lines             2

window_border_width                  0.1
draw_minimal_borders                 yes
window_margin_width                  0 0
single_window_margin_width           -1
window_padding_width                 0 6
placement_strategy                   center

inactive_text_alpha                  0.95
resize_debounce_time                 0.1
resize_in_steps                      no

tab_bar_style                        powerline
tab_bar_edge                         bottom
tab_bar_margin_width                 0.0
tab_bar_min_tabs                     2
tab_switch_strategy                  previous
tab_fade                             0.25 0.5 0.75 1
tab_separator                        " "
tab_title_template                   "{title}"

active_tab_title_template            none
active_tab_font_style                bold_italic
inactive_tab_font_style              normal
tab_bar_background                   none

mouse_map                            cmd+left click grabbed,ungrabbed mouse_click_url_or_select

include keymap.conf
