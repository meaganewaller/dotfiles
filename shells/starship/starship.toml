[ruby]
symbol = "оһ‘ "
format = "[оӮ¶](fg:purple bg:none)[$symbol](fg:foreground bg:purple)[оӮҙ](bg:purple_light fg:purple)[ $version]($style)[оӮҙ](fg:purple_light bg:none) "
style = "fg:foreground bg:purple_light"

[character]
format = "\nв•°в•ҙ$symbol "
success_symbol = "[вҹ¶](green bold)"
error_symbol = "[оҷ”](red)"
vicmd_symbol = "[оҳ«](yellow)"

[username]
format = "[пҖҮ $user]($style) "
style_root = "bold blue"
style_user = "bold cyan"
disabled = true

[hostname]
ssh_only = true
format = "[оӮ¶](fg:blue bg:none)[$ssh_symbol](fg:blue_dark bg:blue)[оӮҙ](fg:blue bg:blue)[ $hostname]($style)[оӮҙ](fg:blue bg:none) "
style = "fg:bold blue_dark bg:blue"
ssh_symbol = "о¬Ғ"
trim_at = "-"
disabled = false

[git_branch]
symbol = "пҗҳ"
# symbol = "рҹҢұ "
truncation_length = 4
truncation_symbol = ""
format = "[оӮ¶](fg:cyan bg:none)[$symbol](fg:blue_dark bg:cyan)[оӮҙ](fg:cyan bg:cyan)[$branch]($style)[оӮҙ](fg:cyan bg:none) "
style = "fg:blue_dark bg:cyan"

[git_commit]
tag_symbol = "пҖ« "
tag_disabled = false
format = "[пҗҷ $hash$tag]($style) "

[git_status]
# format = "([п‘ҝ $all_status$ahead_behind]($style) )"
format = "[оӮ¶](fg:purple bg:none)[$all_status$ahead_behind]($style)[оӮҙ](fg:purple bg:none)"
conflicted = "="
ahead =	"вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
up_to_date = "вң“"
untracked = "?${count}"
stashed = "оӘҘ"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "п’Һ${count}"
style = "bg:purple fg:foreground"
# style = "bold yellow"
ignore_submodules = true
# format="[оӮ¶](fg:#4da0ff bg:none)[$all_status$ahead_behind](fg:#282c34 bg:#4da0ff)[оӮҙ](fg:#4da0ff bg:none)"
# conflicted = " рҹҗ— "
# ahead = " рҹҗҮ${count} "
# behind = " рҹҗў${count} "
# diverged = " рҹ”ұ рҹҗҮ${ahead_count} рҹҗў${behind_count} "
# untracked = " рҹҰ…${count} "
# stashed = " рҹҗ« "
# modified = " рҹҗҫ${count} "
# staged = " рҹҗҙ${count} "
# renamed = " рҹҰӢ${count} "
# deleted = " рҹҗҡ${count} "

[git_state]
merge = "пҗҷ MERGING"
rebase = "пҗҷ REBASING"
cherry_pick =  "пҗҷ PICKING"
style = "bold red"
revert = "пҗҷ REVERTING"
bisect = "пҗҷ BISECTING"

[directory]
read_only = " п Ҫ"
format = "[оӮ¶](fg:foreground bg:none)[о—ҝ](fg:blue_dark bg:foreground)[оӮҙ](fg:foreground bg:foreground)[ $path]($style)[оӮҙ](fg:foreground bg:none) "
style = "fg:blue_dark bg:foreground"
truncation_length = 3
truncate_to_repo=false

[directory.substitutions]
"~" = "пҖ• ~"
"пҖ• ~/Documents" = "пңҳ ~/Documents"
"пҖ• ~/Downloads" = "пҖҷ ~/Downloads"
"пҖ• ~/Desktop"   = "п Ў ~/Desktop"
"пҖ• ~/Music"     = "пҖҒ ~/Music"
"пҖ• ~/Pictures"  = "пҖҫ ~/Pictures"
"пҖ• ~/Library"   = "о®ң ~/Library"
"пҖ• ~/Dropbox"   = "п…« ~/Dropbox"
"пҖ• ~/code"      = "пҷЁ ~/code"
"пҖ• ~/dev"       = "пҷЁ ~/dev"
"пҖ• ~/workspace" = "пҷЁ ~/workspace"
"пҖ• ~/.dotfiles" = "о¬ё ~/.dotfiles"

[docker_context]
symbol = "пҢҲ "

[time]
disabled = false
format="[оӮ¶](fg:red_light bg:none)[рҹ’–](fg:red_light bg:red_light)[оӮҙ](fg:red_light bg:red_light)[ $time]($style)[оӮҙ](fg:red_light bg:none)"
time_format = "%l:%m%p" #change to %R to only have HH:MM
style="fg:darkest_pink bg:red_light"


[battery]
full_symbol = "у°Ӯ„ "
charging_symbol = "о¬ӯ "
discharging_symbol = "у°Ӯ… "

[[battery.display]]
threshold = 25
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 101
style = "green"


[cmd_duration]
min_time = 1
format = "[оӮ¶]($style)[[у°”ҹ ](bg:foreground_light fg:background_light bold)$duration](bg:foreground_light fg:background_light)[оӮҙ ]($style)"
disabled = false
style = "bg:none fg:foreground_light"

