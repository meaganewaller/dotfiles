[ruby]
symbol = "оЮС "
format = "[оВґ](fg:love bg:none)[$symbol](fg:text bg:love)[оВі](bg:love_lighter fg:love)[ $version]($style)[оВі](fg:love_lighter bg:none) "
style = "fg:text bg:love_lighter"

[character]
format = "\nвХ∞вХі$symbol "
success_symbol = "[оКО](iris bold)"
error_symbol = "[пЫЈ](love)"
vicmd_symbol = "[оШЂ](gold)"

[username]
format = "[пАЗ $user]($style) "
style_root = "bold foam"
style_user = "bold pine"
disabled = true

[hostname]
ssh_only = true
format = "[оВґ](fg:foam bg:none)[$ssh_symbol](fg:pine bg:foam)[оВі](fg:foam bg:foam)[ $hostname]($style)[оВі](fg:foam bg:none) "
style = "fg:bold pine bg:foam"
ssh_symbol = "пЫњ "
trim_at = "-"
disabled = false

[git_branch]
symbol = "пРШ"
# symbol = "рЯМ± "
truncation_length = 4
truncation_symbol = ""
format = "[оВґ](fg:foam bg:none)[$symbol](fg:pine bg:foam)[оВі](fg:foam bg:foam)[$branch]($style)[оВі](fg:foam bg:none) "
style = "fg:pine bg:foam"

[git_commit]
tag_symbol = "пАЂ "
tag_disabled = false
format = "[пРЩ $hash$tag]($style) "

[git_status]
# format = "([пСњ $all_status$ahead_behind]($style) )"
format = "[оВґ](fg:iris bg:none)[$all_status$ahead_behind]($style)[оВі ](fg:iris bg:none)"
conflicted = "="
ahead =	"вЗ°${count}"
behind = "вЗ£${count}"
diverged = "вЗХвЗ°${ahead_count}вЗ£${behind_count}"
up_to_date = "пШЂ"
untracked = "?${count}"
stashed = "п£Х"
modified = "!${count}"
staged = "+${count}"
renamed = "¬ї${count}"
deleted = "пЩХ${count}"
style = "bg:iris fg:text"
# style = "bold yellow"
ignore_submodules = true
# format="[оВґ](fg:#4da0ff bg:none)[$all_status$ahead_behind](fg:#282c34 bg:#4da0ff)[оВі](fg:#4da0ff bg:none)"
# conflicted = " рЯРЧ "
