# stashed = " рЯРЂ "
# modified = " рЯРЊ${count} "
# staged = " рЯРі${count} "
# renamed = " рЯ¶Л${count} "
# deleted = " рЯРЪ${count} "

[git_state]
merge = "пРЩ MERGING"
cherry_pick = "рЯНТ PICKING"
