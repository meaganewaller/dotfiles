set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

setw -g mode-keys vi
set -g default-terminal "xterm-256color-italic"
set-option -ga terminal-overrides ',xterm-256color-italic:Tc,*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g focus-events on
set -sg escape-time 0

# smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind C-l send-keys 'C-l'
bind-key C-o rotate-window
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
set-window-option -g other-pane-height 10
set-window-option -g other-pane-width 90
bind-key a last-pane
bind-key q display-panes
bind-key c new-window -c "#{pane_current_path}"
bind-key t next-window
bind-key T previous-window
bind-key [ copy-mode
bind-key ] paste-buffer

set-option -g repeat-time 0

# set -g  terminal-overrides      ',xterm-256color:Tc'
# set -g  default-shell /bin/zsh
# set -g  base-index 1
# set -g  history-limit 99999

# set        -g focus-events on
# set-option -g prefix C-a
# bind       C-a send-prefix

# Allows for faster key repetition
# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -sg escape-time 0

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

set -g display-time 2000

set -g visual-bell      off
set -g monitor-activity on
set -g visual-activity  off  # get rid of the 'Activity in window n' message

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

set-window-option -g automatic-rename on
set-window-option -g monitor-activity on
set-window-option -g window-status-current-fg white
set -g renumber-windows on   # renumber windows when one is closed
set -g status-keys vi
set -g status-justify right
set -g status-interval 2

run-shell ~/.tmux/plugins/tpm/tpm
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @onedark_widgets "#(date +%)"
set -g @onedark_time_format "%I:%M %p"
set -g @onedark_date_format "%D"
set -g @yank_selection "primary"
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'