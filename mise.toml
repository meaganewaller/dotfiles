# Development tools for shell scripting and testing

[tools]
"aqua:bats-core/bats-core" = "v1.13.0"
"aqua:koalaman/shellcheck" = "v0.11.0"
"aqua:mikefarah/yq" = "v4.53.2"
"aqua:suzuki-shunsuke/ghalint" = "latest"
hk = "1.45.0"
jq = "latest"
"npm:markdownlint-cli" = "latest"
pkl = "latest"
shfmt = "latest"
stylua = "latest"

[tasks.lint]
description = "Lint and auto-fix"
run = "hk fix"

[tasks.test]
description = "Run test suite"
run = "bats test/"

[tasks."ci:lint"]
description = "Run lint as CI does (hk check, not hk fix)"
run = "hk check"
env = { CI = "true", GITHUB_ACTIONS = "true" }

[tasks."ci:test"]
description = "Run tests as CI does (with CI and GITHUB_ACTIONS set)"
run = "bats test/"
env = { CI = "true", GITHUB_ACTIONS = "true" }

[tasks."ci:all"]
description = "Run the full CI shape locally (lint + test, no install)"
depends = ["ci:lint", "ci:test"]
